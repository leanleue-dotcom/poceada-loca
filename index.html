document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

)\n      .sort((a,b)=>{ const ka=a.fecha+(a.horario==='Nocturna'?'1':'0'), kb=b.fecha+(b.horario==='Nocturna'?'1':'0'); return kb.localeCompare(ka); });\n  }\n  save(){ if(this.state.sample) return; try{ localStorage.setItem(this.SK(), JSON.stringify(this.state.S)); }catch(e){} }\n  persist(newS, extra){ const S=this.norm(newS); this.setState(Object.assign({S}, extra||{}), ()=>this.save()); }\n\n  seed(){\n    const weight=new Array(100).fill(1);\n    [7,13,23,30,45,55,66,77,3,19,42,61,88].forEach(n=>weight[n]+=1.7);\n    [0,99,11,50,34,72].forEach(n=>weight[n]+=0.9);\n    const today=new Date(); let cur=new Date(today); const slots=[];\n    while(slots.length<98){ if(cur.getDay()!==0){ slots.push({date:new Date(cur),hor:'Nocturna'}); slots.push({date:new Date(cur),hor:'Matutina'}); } cur.setDate(cur.getDate()-1); }\n    slots.reverse();\n    let pozo=55_000_000+Math.random()*35_000_000, sNum=4790; const res=[];\n    for(const s of slots){\n      sNum++; const nums=this.weightedPick(weight,20); const hit8=Math.random()<0.05;\n      pozo += 3_500_000 + Math.random()*6_000_000;\n      res.push({ id:s.date.getTime()+(s.hor==='Nocturna'?1:0)+Math.random(), num:String(sNum),\n        fecha:s.date.toISOString().slice(0,10), horario:s.hor, numeros:nums,\n        pozo:Math.round(pozo), vac:!hit8, w8:hit8?(Math.random()<0.85?1:2):0,\n        w7:Math.random()<0.45?1+Math.floor(Math.random()*2):0, w6:Math.floor(Math.random()*8),\n        w5:4+Math.floor(Math.random()*24), g8:0,g7:0,g6:0, obs:'ejemplo' });\n      if(hit8) pozo=22_000_000+Math.random()*16_000_000;\n    }\n    return res;\n  }\n  weightedPick(weight,k){ const w=weight.slice(), out=[]; for(let i=0;i<k;i++){ let tot=0; for(let n=0;n<100;n++)tot+=w[n]; let r=Math.random()*tot, pick=0; for(let n=0;n<100;n++){ r-=w[n]; if(r<=0){pick=n;break;} } out.push(pick); w[pick]=0; } return out.sort((a,b)=>a-b); }\n\n  // ============ STATS ============\n  pad(n){ return String(n).padStart(2,'0'); }\n  fmt(n){ if(n==null) return '—'; return '$'+Math.round(n).toLocaleString('es-AR'); }\n  fmtM(n){ if(n==null) return '—'; return '$'+(n/1e6).toFixed(1)+'M'; }\n  freq(list){ const f=new Array(100).fill(0); list.forEach(s=>s.numeros.forEach(n=>f[n]++)); return f; }\n  lastSeen(list){ const ls=new Array(100).fill(null); list.forEach((s,i)=>s.numeros.forEach(n=>{ if(ls[n]===null)ls[n]=i; })); return ls; }\n  gaps(list){ const g={}; for(let n=0;n<100;n++){ const app=[]; list.forEach((s,i)=>{ if(s.numeros.includes(n))app.push(i); }); if(!app.length){ g[n]={cur:list.length,max:list.length,avg:list.length,cnt:0}; continue; } const d=[]; for(let i=1;i<app.length;i++)d.push(app[i]-app[i-1]); g[n]={cur:app[0],max:d.length?Math.max(...d):list.length,avg:d.length?Math.round(d.reduce((a,b)=>a+b,0)/d.length*10)/10:Math.round(list.length/app.length*10)/10,cnt:app.length}; } return g; }\n  pairs(list){ const p={}; list.forEach(s=>{ const ns=s.numeros; for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){ const k=ns[i]+'-'+ns[j]; p[k]=(p[k]||0)+1; } }); return p; }\n  trios(list){ const t={}; list.slice(0,120).forEach(s=>{ const ns=s.numeros; for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++)for(let k=j+1;k<ns.length;k++){ const kk=ns[i]+'-'+ns[j]+'-'+ns[k]; t[kk]=(t[kk]||0)+1; } }); return t; }\n  markov(list){ const sc=new Array(100).fill(0); if(list.length<2)return sc; list[0].numeros.forEach(n=>{ for(let i=0;i<list.length-1;i++){ if(list[i].numeros.includes(n))list[i+1].numeros.forEach(m=>sc[m]++); } }); return sc; }\n  sectors(list){ const s=Array.from({length:10},()=>({sum:0})); list.forEach(ss=>ss.numeros.forEach(n=>s[Math.floor(n/10)].sum++)); const exp=list.length*2; return s.map((x,i)=>({i,sum:x.sum,pct:Math.round(x.sum/(list.length||1)*10)/10,due:exp-x.sum})); }\n  scoreAll(list){ if(!list||list.length<2)return new Array(100).fill(0); const N=list.length, fr=this.freq(list), ls=this.lastSeen(list), gs=this.gaps(list), mk=this.markov(list), sec=this.sectors(list); const mfr=Math.max(...fr)||1, mmk=Math.max(...mk)||1, mgs=Math.max(...Object.values(gs).map(g=>g.cur))||1; return fr.map((_,n)=>{ let s=0; s+=25*(fr[n]/mfr); const cg=gs[n].cur, ag=gs[n].avg||5; if(cg>ag*1.1)s+=30*Math.min(cg/mgs*1.5,1); s+=20*(mk[n]/mmk); const li=ls[n]===null?N:ls[n]; s+=15*Math.exp(-li/10); const si=Math.floor(n/10); if(sec[si].due>0)s+=10*(sec[si].due/(N*2)); return Math.round(s*10)/10; }); }\n  getWin(){ return this.state.S.slice(0, Math.min(this.state.win, this.state.S.length)); }\n  predict(list){ const sc=this.scoreAll(list); const ranked=[...sc.map((s,i)=>({n:i,s}))].sort((a,b)=>b.s-a.s); const picked=new Set(), secCnt=new Array(10).fill(0); for(const it of ranked){ if(picked.size>=8)break; const s=Math.floor(it.n/10); if(secCnt[s]===0){ picked.add(it.n); secCnt[s]++; } } for(const it of ranked){ if(picked.size>=8)break; if(!picked.has(it.n)){ picked.add(it.n); secCnt[Math.floor(it.n/10)]++; } } const nums=[...picked].sort((a,b)=>a-b); const avg=Math.round(nums.reduce((a,n)=>a+sc[n],0)/nums.length); return {nums, score:avg, conf:Math.min(Math.round(avg/50*100),94), ranked, sc}; }\n\n  // winners / odds\n  comb(n,k){ if(k<0||k>n)return 0; k=Math.min(k,n-k); let r=1; for(let i=0;i<k;i++)r=r*(n-i)/(i+1); return r; }\n  oddsK(k){ return this.comb(20,k)*this.comb(80,8-k)/this.comb(100,8); }\n  winnerStats(){ const S=this.state.S, N=S.length; const has=S.some(s=>s.w8||s.w7||s.w6||s.w5||s.vac!=null); const cats=[8,7,6,5]; const out={}; cats.forEach(c=>{ const key='w'+c; const drawsWith=S.filter(s=>s[key]>0).length; out[c]={ drawsWith, every: drawsWith? N/drawsWith : null, odds:this.oddsK(c), totalW:S.reduce((a,s)=>a+(s[key]||0),0) }; }); return {has,N,out}; }\n  vacancy(){ const S=this.state.S; let cur=0; for(const s of S){ if(s.vac===false){break;} cur++; } let longest=0,run=0,gaps=[],last=0; S.slice().reverse().forEach((s)=>{ if(s.vac===false){ if(run>longest)longest=run; gaps.push(run); run=0; } else run++; }); if(run>longest)longest=run; const wins=S.filter(s=>s.vac===false).length; return {cur, longest, avg: wins? Math.round(S.length/wins) : null, wins}; }\n  pozoSeries(){ const S=this.state.S.slice().reverse().filter(s=>s.pozo!=null); return S.map(s=>s.pozo); }\n\n  // ============ HANDLERS ============\n  go(tab){ this.setState({tab, msg:null}, ()=>{ const sc=document.getElementById('sc'); if(sc)sc.scrollTop=0; }); }\n  toggleSel(n){ const sel=this.state.sel.slice(); const i=sel.indexOf(n); if(i>=0)sel.splice(i,1); else { if(sel.length>=20)return; sel.push(n); } this.setState({sel}); }\n  toggleWheel(n){ const w=this.state.wheelSel.slice(); const i=w.indexOf(n); if(i>=0)w.splice(i,1); else { if(w.length>=12)return; w.push(n); } this.setState({wheelSel:w}); }\n  parseQ(v){ const found=(v.match(/\\d{1,2}/g)||[]).map(Number).filter(n=>n>=0&&n<=99); const sel=[...new Set(found)].slice(0,20); this.setState({qinput:v, sel}); }\n  clearLoad(){ this.setState({sel:[],qinput:'',loadNum:'',loadPozo:'',w8:0,w7:0,w6:0,w5:0,msg:null}); }\n  guardar(){ const st=this.state; if(st.sel.length!==20){ this.setState({msg:{t:'e',m:'Seleccioná exactamente 20 números (llevás '+st.sel.length+').'}}); return; } if(!st.loadFecha){ this.setState({msg:{t:'w',m:'Ingresá la fecha.'}}); return; } let base=st.sample?[]:st.S.slice(); if(base.find(s=>s.num===st.loadNum&&s.fecha===st.loadFecha&&s.horario===st.loadHor&&st.loadNum!=='')){ this.setState({msg:{t:'w',m:'Ese sorteo ya está cargado.'}}); return; } const rec={ id:Date.now(), num:st.loadNum||'—', fecha:st.loadFecha, horario:st.loadHor, numeros:st.sel.slice().sort((a,b)=>a-b), pozo: st.loadPozo?Number(st.loadPozo.replace(/\\D/g,'')):null, vac: st.w8>0?false:(st.loadPozo?true:null), w8:+st.w8||0,w7:+st.w7||0,w6:+st.w6||0,w5:+st.w5||0, g8:0,g7:0,g6:0, obs:'' }; base.push(rec); this.persist(base,{sample:false,sel:[],qinput:'',loadNum:'',loadPozo:'',w8:0,w7:0,w6:0,w5:0,msg:{t:'s',m:'¡Sorteo guardado!'}}); setTimeout(()=>{ if(this.state.msg&&this.state.msg.m==='¡Sorteo guardado!')this.setState({msg:null}); },2500); }\n  delDraw(id){ if(!confirm('¿Borrar este sorteo?'))return; this.persist(this.state.S.filter(s=>s.id!==id)); }\n  clearAll(){ if(!confirm('¿Borrar TODOS los sorteos cargados?'))return; this.setState({S:this.seed(),sample:true}, ()=>{ try{localStorage.removeItem(this.SK());}catch(e){} this.setState(s=>({S:this.norm(s.S)})); }); }\n  parseIPLyC(raw, horario){\n    const hor=(/noc/i.test(horario||'')?'Nocturna':'Matutina');\n    const blocks=raw.split(/(?=FECHA\\s*:)/i).filter(b=>b.trim());\n    const list=blocks.length?blocks:[raw];\n    const out=[];\n    list.forEach(block=>{\n      const fm=block.match(/(\\d{1,2})[\\/\\-](\\d{1,2})[\\/\\-](\\d{4})/);\n      const sm=block.match(/Sorteo\\s*:?\\s*0*(\\d{3,6})/i);\n      if(!fm&&!sm)return;\n      const fecha=fm?(fm[3]+'-'+this.pad(+fm[2])+'-'+this.pad(+fm[1])):'';\n      const num=sm?sm[1]:'—';\n      const aIdx=block.search(/ACIERTOS|PREMIO|GANADORES/i);\n      let head=aIdx>=0?block.slice(0,aIdx):block;\n      if(fm)head=head.split(fm[0]).join('  ');\n      const nums=[];\n      (head.match(/\\b\\d{1,2}\\b/g)||[]).forEach(x=>{ const n=+x; if(n>=0&&n<=99&&!nums.includes(n)&&nums.length<20)nums.push(n); });\n      if(nums.length<18)return;\n      const tail=aIdx>=0?block.slice(aIdx):'';\n      const wn={8:0,7:0,6:0,5:0}, pr={8:null,7:null,6:null,5:null};\n      tail.split(/\\n/).forEach(line=>{ const m=line.match(/^[^\\dA-Za-z]*([5-8])[ \\t]+(\\d+)[ \\t]+\\$?\\s*([\\d.]+)/); if(m){ const ac=+m[1]; wn[ac]=+m[2]; pr[ac]=parseInt(m[3].replace(/\\./g,''),10)||null; } });\n      out.push({ num, fecha, horario:hor, numeros:nums.slice(0,20), w8:wn[8],w7:wn[7],w6:wn[6],w5:wn[5], p8:pr[8],p7:pr[7],p6:pr[6],p5:pr[5], pozo:pr[8], vac:wn[8]>0?false:true, g8:0,g7:0,g6:0, obs:'IPLyC' });\n    });\n    return out;\n  }\n  doImport(){ const raw=this.state.impText.trim(); if(!raw){ this.setState({msg:{t:'w',m:'Pegá el extracto o elegí un archivo primero.'}}); return; }\n    let parsed=[];\n    try{ const j=JSON.parse(raw)
